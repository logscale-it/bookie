# cargo-audit allowlist for the bookie Rust crate.
#
# This file is auto-discovered by `cargo audit` when invoked from the
# directory containing it (the CI job sets `working-directory: src-tauri`).
#
# Add an entry under [advisories].ignore when an upstream advisory has no
# patched version yet AND the impact has been triaged. Each entry MUST have
# a one-line justification and, where relevant, a re-evaluation date.
#
# Reference: https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
ignore = [
  # lru 0.12.5 IterMut unsoundness; reaches us only as a transitive dep of
  # aws-sdk-s3 1.119.0. No fixed release of aws-sdk-s3 bumps lru as of
  # 2026-05-09. Re-evaluate when aws-sdk-s3 publishes a bump.
  "RUSTSEC-2026-0002",
]
