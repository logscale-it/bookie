[package]
name = "bookie"
version = "0.1.0"
description = "A Tauri App"
authors = ["Ranel Karimov"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
# The `_lib` suffix may seem redundant but it is necessary
# to make the lib name unique and wouldn't conflict with the bin name.
# This seems to be only an issue on Windows, see https://github.com/rust-lang/cargo/issues/8519
name = "bookie_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
tauri-plugin-dialog = "2"
aws-sdk-s3 = { version = "1", default-features = false, features = ["rustls", "rt-tokio"] }
aws-credential-types = "1"
tokio = { version = "1", default-features = false, features = ["time", "macros", "rt"] }
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter", "fmt"] }
tracing-appender = "0.2"
tracing-log = "0.2"
keyring = "4"
keyring-core = "1"
sha2 = "0.10"
url = "2"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
# Used by tests/migrations.rs (TEST-2.a) to run each migration against a
# fresh in-memory SQLite DB and assert the down migration restores the
# pre-up schema. `bundled` keeps the test self-contained (no system
# libsqlite3 required) and matches the libsqlite3-sys version already in
# the lockfile via tauri-plugin-sql -> sqlx-sqlite.
rusqlite = { version = "0.32", features = ["bundled"] }

[profile.release]
panic = "abort" # Strip expensive panic clean-up logic
codegen-units = 1 # Compile crates one after another so the compiler can optimize better
lto = true # Enables link time optimizations
opt-level = "s" # Optimize for binary size
strip = true # Remove debug symbols
