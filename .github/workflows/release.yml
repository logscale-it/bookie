name: Release

on:
  pull_request:
    branches: [master]
    types: [closed]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    if: github.event.pull_request.merged == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
            target: ""
          - os: macos-latest
            label: macos-arm
            target: aarch64-apple-darwin
          - os: macos-latest
            label: macos-intel
            target: x86_64-apple-darwin
          - os: windows-latest
            label: windows
            target: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libdbus-1-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ runner.os }}-${{ matrix.target }}-

      - run: bun install

      - name: Build (with target)
        if: matrix.target != ''
        run: bun run tauri build -- --target ${{ matrix.target }}

      - name: Build (default)
        if: matrix.target == ''
        run: bun run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  create-release:
    needs: build-release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          body: |
            ## macOS Users
            macOS may show "app is damaged" since the app is not notarized. Run this in Terminal after installing:
```
            xattr -cr /Applications/bookie.app
```
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.exe
          overwrite_files: true